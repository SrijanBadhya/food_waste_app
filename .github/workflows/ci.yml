name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # 1. Build Stage: Prepare environment and check package dependencies
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pbr
          echo "Dependencies installed successfully"

  # 2. Test Stage: Execute Unit and Integration test targets isolated
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov pbr

      - name: Run Unit Tests
        run: |
          echo "Running unit tests..."
          pytest tests/unit/ -v --cov=. --cov-report=term --cov-report=xml

      - name: Run Integration Tests
        run: |
          echo "Running integration tests..."
          pytest tests/integration/ -v --tb=short

  # 3. Coverage Stage: Ensure testing verification clears minimum target boundaries
  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov pbr

      - name: Run tests with coverage validation
        run: |
          echo "Checking test coverage metrics..."
          pytest tests/ --cov=. --cov-fail-under=80 --cov-report=term-missing --cov-report=html

      - name: Upload coverage HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov

  # 4. Lint Stage: Evaluate project code quality scoring thresholds
  lint:
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linter and Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pylint pbr

      - name: Run pylint and evaluate scoring gate
        run: |
          echo "Running pylint code analysis..."
          pylint app.py tests/ --output-format=text > lint_report.txt || true
          cat lint_report.txt
          
          # Extract and parse score out of text report file
          score_line=$(grep -E "rated at" lint_report.txt || true)
          score=$(echo "$score_line" | sed -n 's/.*rated at \([0-9.]*\)\/10.*/\1/p')
          echo "Parsed Pylint score: ${score:-not-found}"
          
          if [ -z "$score" ]; then
            echo "Error: Could not extract static analysis score metric."
            exit 1
          fi
          
          # Force build failure if score lands under the 7.0 threshold barrier
          awk -v s="$score" 'BEGIN{ if (s+0 < 7.0) exit 1 }' || (echo "Pylint quality score $score falls below pipeline limit (7.0)" && exit 1)

      - name: Upload lint report artifact
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint_report.txt

  # 5. Formatting Stage: Ensure syntax matches format rules
  format:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Formatter
        run: |
          python -m pip install --upgrade pip
          pip install black

      - name: Check Formatting Rules compliance
        run: |
          echo "Validating code layout with black..."
          black . --check --exclude 'fwa|venv|\.pytest_cache'

      - name: Output diff reports if modifications exist
        if: failure()
        run: black . --diff --exclude 'fwa|venv|\.pytest_cache' || true

  # 6. Security Stage: Scan for vulnerabilities using Bandit
  security:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pbr

      - name: Run security checks (Standard Console stdout)
        run: |
          echo "Executing Bandit security scanning pass..."
          bandit -r . -x ./fwa -v || true

      - name: Run security checks (JSON generation pass)
        run: |
          rm -f security_report.json || true
          bandit -r . -x ./fwa -f json -o security_report.json || true

      - name: Upload security report artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security_report.json

  # 7. Deploy Stage: Bundle validated system files into stable package artifact zip
  deploy:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull analysis artifacts downward
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: Build compression archive distribution package
        run: |
          echo "Assembling deployment bundle..."
          rm -f deployment-package.zip || true
          
          # Compile structural python files to pre-optimized bytecode (.pyc)
          python -m compileall -b -f app.py tests/ || true
          
          # Zip core code modules while explicitly purging massive virtual environment directories
          zip -r deployment-package.zip app.py tests/ artifacts/ README.md requirements.txt 2>/dev/null || true
          echo "Successfully assembled distribution file deployment-package.zip"

      - name: Export deployment package artifact zip
        uses: actions/upload-artifact@v4
        with:
          name: deployment-zip
          path: deployment-package.zip